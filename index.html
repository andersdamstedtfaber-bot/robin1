<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matematik Quest</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(160deg, #0a0a2e 0%, #1a0a3e 50%, #0a1a3e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 12px;
      font-family: 'Nunito', sans-serif;
    }

    .g {
      width: 100%;
      max-width: 560px;
      color: #fff;
    }

    /* HEADER */
    .gtitle {
      font-family: 'Bangers', cursive;
      text-align: center;
      font-size: 36px;
      letter-spacing: 3px;
      color: #fff;
      text-shadow: 0 0 20px #7c3aed, 3px 3px 0 #4c1d95;
      margin-bottom: 2px;
    }
    .gsub {
      text-align: center;
      font-size: 11px;
      color: #a78bfa;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(124,58,237,0.5);
      border-radius: 12px;
      padding: 8px 14px;
      margin-bottom: 8px;
      font-weight: 900;
      font-size: 13px;
    }
    .hearts { color: #f43f5e; font-size: 16px; letter-spacing: 3px; }
    .score { color: #fbbf24; }
    .lv { color: #7c3aed; background: #ede9fe; border-radius: 6px; padding: 2px 8px; font-size: 11px; }

    /* XP BAR */
    .xpbar {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      height: 10px;
      margin-bottom: 3px;
      overflow: hidden;
      border: 1px solid rgba(124,58,237,0.4);
    }
    .xpfill {
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      height: 100%;
      border-radius: 20px;
      transition: width .4s;
    }
    .xplbl { font-size: 9px; color: #a78bfa; text-align: right; margin-bottom: 6px; font-weight: 700; }
    .lvlbadge { font-size: 9px; color: #c4b5fd; text-align: center; margin-bottom: 12px; font-weight: 700; background: rgba(124,58,237,0.2); border-radius: 8px; padding: 4px 10px; }

    /* TOPIC BUTTONS */
    .topics { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .tbtn {
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(124,58,237,0.4);
      color: #a78bfa;
      font-family: 'Nunito', sans-serif;
      font-size: 10px;
      font-weight: 900;
      padding: 7px 10px;
      cursor: pointer;
      border-radius: 8px;
      flex: 1;
      text-align: center;
    }
    .tbtn.on { border-color: #a855f7; color: #fff; background: rgba(124,58,237,0.4); }
    .tbtn:hover { border-color: #a855f7; color: #e9d5ff; }

    /* SCENE */
    .scene {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(124,58,237,0.4);
      border-radius: 16px;
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bubble {
      background: rgba(124,58,237,0.25);
      border: 2px solid #7c3aed;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 11px;
      color: #e9d5ff;
      flex: 1;
      line-height: 1.6;
      font-weight: 700;
      position: relative;
    }
    .bubble::before {
      content: '';
      position: absolute;
      left: -9px; top: 12px;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-right: 9px solid #7c3aed;
    }

    /* QUESTION BOX */
    .qbox {
      background: rgba(124,58,237,0.15);
      border: 3px solid #7c3aed;
      border-radius: 16px;
      padding: 18px 16px;
      margin-bottom: 10px;
      text-align: center;
    }
    .qlbl {
      font-size: 10px;
      color: #a78bfa;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .qeq {
      font-family: 'Bangers', cursive;
      font-size: 32px;
      color: #fbbf24;
      text-shadow: 2px 2px 0 #92400e, 0 0 20px #f59e0b;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .qask {
      font-size: 13px;
      color: #e9d5ff;
      font-weight: 900;
      margin-bottom: 4px;
    }
    .qhint {
      font-size: 12px;
      color: #fbbf24;
      margin-top: 10px;
      line-height: 1.8;
      font-weight: 700;
    }
    .mtable {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
    }
    .mcell {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(124,58,237,0.5);
      color: #c4b5fd;
      font-size: 12px;
      font-weight: 900;
      padding: 5px 8px;
      min-width: 38px;
      text-align: center;
      border-radius: 6px;
    }
    .mcell.hit {
      background: rgba(251,191,36,0.2);
      border-color: #fbbf24;
      color: #fbbf24;
    }

    /* ANSWER ROW */
    .ansrow { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .ainput {
      background: rgba(255,255,255,0.08);
      border: 3px solid rgba(124,58,237,0.6);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 20px;
      font-weight: 900;
      padding: 12px 14px;
      outline: none;
      grid-column: 1 / -1;
      width: 100%;
      border-radius: 12px;
      text-align: center;
    }
    .ainput:focus { border-color: #a855f7; background: rgba(124,58,237,0.2); }
    .ainput::placeholder { color: rgba(167,139,250,0.5); font-size: 14px; }

    .btn {
      border: none;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 900;
      padding: 14px 8px;
      cursor: pointer;
      width: 100%;
      border-radius: 10px;
      letter-spacing: 1px;
    }
    .btnG {
      background: linear-gradient(180deg, #059669, #047857);
      border-bottom: 4px solid #022c22;
      text-shadow: 1px 1px 0 #022c22;
    }
    .btnG:hover { background: linear-gradient(180deg, #10b981, #059669); }
    .btnH {
      background: linear-gradient(180deg, #d97706, #b45309);
      border-bottom: 4px solid #451a03;
      text-shadow: 1px 1px 0 #451a03;
    }
    .btnH:hover { background: linear-gradient(180deg, #f59e0b, #d97706); }

    /* FEEDBACK */
    .fb { padding: 12px 14px; margin-bottom: 10px; font-size: 12px; line-height: 1.8; display: none; font-weight: 700; border-radius: 12px; white-space: pre-line; }
    .fb.ok { display: block; background: rgba(5,150,105,0.2); border: 2px solid #059669; color: #6ee7b7; }
    .fb.no { display: block; background: rgba(239,68,68,0.15); border: 2px solid #ef4444; color: #fca5a5; }

    /* SOLUTION */
    .sol { display: none; background: rgba(30,27,75,0.8); border: 2px solid #6366f1; padding: 16px; margin-bottom: 10px; font-size: 13px; line-height: 2.4; color: #c7d2fe; border-radius: 14px; font-weight: 700; }
    .sol.vis { display: block; }
    .soltitle { color: #818cf8; font-size: 11px; letter-spacing: 2px; margin-bottom: 8px; font-weight: 900; }
    .sstep { color: #a5b4fc; display: block; }
    .sstep.hl { color: #fbbf24; font-size: 15px; }

    /* BOOM */
    .boom { text-align: center; font-size: 28px; display: none; margin: 6px 0; }
    .boom.vis { display: block; }

    /* NEXT BUTTON */
    .nxtrow { display: none; margin-bottom: 12px; }
    .nxtrow.vis { display: block; }
    .btnNXT {
      display: block;
      width: 100%;
      background: linear-gradient(180deg, #fbbf24, #f59e0b);
      border: none;
      border-bottom: 5px solid #92400e;
      color: #1a1a00;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 900;
      padding: 16px;
      cursor: pointer;
      text-align: center;
      border-radius: 12px;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
    }
    .btnNXT:hover { background: linear-gradient(180deg, #fde047, #fbbf24); }
    .btnNXT:active { border-bottom: 2px solid #92400e; transform: translateY(3px); }

    /* INVENTORY */
    .inv { display: flex; gap: 6px; justify-content: center; margin-top: 14px; }
    .slot {
      width: 52px; height: 52px;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(124,58,237,0.5);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      position: relative;
    }
    .slot.on { border-color: #fbbf24; background: rgba(251,191,36,0.1); }
    .cnt { position: absolute; bottom: 2px; right: 4px; font-size: 9px; color: #fff; font-weight: 900; text-shadow: 1px 1px 0 #000; }
  </style>
</head>
<body>
<div class="g">
  <div class="gtitle">MATEMATIK QUEST</div>
  <div class="gsub">LØS LIGNINGER — OVERLEV KAMPEN!</div>

  <div class="topbar">
    <div class="hearts" id="hearts">♥♥♥</div>
    <div><span class="score">⭐ <span id="sc">0</span></span></div>
    <div><span class="lv">LVL <span id="lv">1</span></span></div>
  </div>
  <div class="xpbar"><div class="xpfill" id="xpf" style="width:0%"></div></div>
  <div class="xplbl">XP: <span id="xpt">0/5</span></div>
  <div class="lvlbadge" id="lvlbadge">Niveau 1 — kun positive tal</div>

  <div class="topics">
    <button class="tbtn on" id="bt-simple" onclick="setTopic('simple')">ax + b = c</button>
    <button class="tbtn" id="bt-frac" onclick="setTopic('frac')">x/a + b = c</button>
    <button class="tbtn" id="bt-both" onclick="setTopic('both')">x begge sider</button>
  </div>

  <div class="scene">
    <span id="creeper" style="font-size:34px;transition:transform .3s;">👾</span>
    <div class="bubble" id="bbl">Løs ligningen for at stoppe mig!</div>
    <span style="font-size:34px;">🧑</span>
  </div>

  <div class="qbox">
    <div class="qlbl">— OPGAVE —</div>
    <div class="qeq" id="qeq">...</div>
    <div class="qask">Hvad er x?</div>
    <div class="qhint" id="qh"></div>
    <div class="mtable" id="mtable"></div>
  </div>

  <div class="ansrow">
    <input class="ainput" type="number" id="ai" placeholder="Skriv x her..." step="any" inputmode="numeric">
    <button class="btn btnG" onclick="check()">✓ SVAR</button>
    <button class="btn btnH" onclick="hint()">💡 TIP</button>
  </div>

  <div class="fb" id="fb"></div>
  <div class="boom" id="boom">💥 ELIMINERET! 💥</div>

  <div class="sol" id="sol">
    <div class="soltitle">📘 SÅDAN LØSER DU DET:</div>
    <div id="solsteps"></div>
  </div>

  <div class="nxtrow" id="nxt">
    <button class="btnNXT" onclick="next()">▶ NÆSTE OPGAVE</button>
  </div>

  <div class="inv">
    <div class="slot on">🏆<span class="cnt" id="is">0</span></div>
    <div class="slot">⭐<span class="cnt" id="id">0</span></div>
    <div class="slot">🧪<span class="cnt" id="ix">0</span></div>
    <div class="slot">🛡️<span class="cnt" id="ia">0</span></div>
  </div>
</div>

<script>
var S = { hearts:3, score:0, level:1, xp:0, xpN:5, topic:'simple', cur:null, hints:0, sw:0, di:0, xb:0, ap:0 };
var BUBBLES = [
  'Løs det... hvis du tør! 😤',
  'Du kan aldrig slå mig! 💣',
  'Matematik er din fjende nu! 👾',
  'Jeg har 99 HP tilbage! 🔥',
  'Kun 1 tilbage i Battle Royale... det er DIG! 👊'
];
function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pos(){ return S.level <= 2; }

function gen(){
  var t=S.topic, p=pos(), tries=0;

  if(t==='simple'){
    var a,b,x,c;
    do {
      a=ri(1, p?3:5);
      x=p?ri(1,8):ri(-6,10);
      b=p?ri(0,8):ri(-8,8);
      c=a*x+b;
      tries++;
    } while(p && (x<0||c<0) && tries<50);
    var aStr=a===1?'x':a+'x';
    var bs=b===0?'':(b>0?' + '+b:' - '+Math.abs(b));
    return {
      eq: aStr+bs+' = '+c,
      ans: x,
      tableNum: a,
      hint: 'Træk '+(b>=0?b:Math.abs(b))+' fra begge sider, og del med '+a,
      sol: [
        aStr+bs+' = '+c,
        b!==0?'Træk '+b+' fra begge sider:':null,
        b!==0?aStr+' = '+(c-b):null,
        a!==1?'Del begge sider med '+a+':':null,
        'x = '+x
      ].filter(Boolean)
    };
  }

  if(t==='frac'){
    var a,b,x,c;
    do {
      a=ri(2, p?3:5);
      x=p?ri(1,6)*a:ri(-3,6)*a;
      b=p?ri(0,5):ri(-5,5);
      c=x/a+b;
      tries++;
    } while((p&&(x<0||c<0)) && tries<60);
    if(!Number.isInteger(x/a)||tries>=60){ S.topic='simple'; return gen(); }
    var bs=b===0?'':(b>0?' + '+b:' - '+Math.abs(b));
    return {
      eq: 'x / '+a+bs+' = '+c,
      ans: x,
      tableNum: a,
      hint: 'Træk '+b+' fra begge sider, og gang med '+a,
      sol: [
        'x / '+a+bs+' = '+c,
        b!==0?'Træk '+b+' fra begge sider:':null,
        b!==0?'x / '+a+' = '+(c-b):null,
        'Gang begge sider med '+a+':',
        'x = '+(c-b)+' × '+a,
        'x = '+x
      ].filter(Boolean)
    };
  }

  if(t==='both'){
    var a,b,d,x,c;
    do {
      a=ri(2, p?4:6);
      d=ri(1,a-1);
      x=p?ri(1,6):ri(-4,6);
      b=p?ri(0,6):ri(-6,6);
      c=(a-d)*x+b;
      tries++;
    } while(p && (x<0||c<0) && tries<60);
    var bs=b===0?'':(b>0?' + '+b:' - '+Math.abs(b));
    return {
      eq: a+'x'+bs+' = '+d+'x + '+c,
      ans: x,
      tableNum: (a-d),
      hint: 'Flyt '+d+'x til venstre ved at trække det fra begge sider',
      sol: [
        a+'x'+bs+' = '+d+'x + '+c,
        'Træk '+d+'x fra begge sider:',
        (a-d)+'x'+bs+' = '+c,
        b!==0?'Træk '+b+' fra begge sider:':null,
        b!==0?(a-d)+'x = '+(c-b):null,
        'Del begge sider med '+(a-d)+':',
        'x = '+x
      ].filter(Boolean)
    };
  }
}

function lvlLabel(){
  var l=S.level;
  document.getElementById('lvlbadge').textContent =
    l<=1 ? 'Niveau 1 — kun positive tal' :
    l===2 ? 'Niveau 2 — stadig positive tal' :
    l===3 ? 'Niveau 3 — negative tal kommer nu' :
    'Niveau '+l+' — avancerede opgaver';
}

function ui(){
  var h='';
  for(var i=0;i<3;i++) h+='<span style="color:'+(i<S.hearts?'#f43f5e':'#4c1d3a')+'">♥</span>';
  document.getElementById('hearts').innerHTML=h;
  document.getElementById('sc').textContent=S.score;
  document.getElementById('lv').textContent=S.level;
  document.getElementById('xpt').textContent=S.xp+'/'+S.xpN;
  document.getElementById('xpf').style.width=Math.min(100,S.xp/S.xpN*100)+'%';
  document.getElementById('is').textContent=S.sw;
  document.getElementById('id').textContent=S.di;
  document.getElementById('ix').textContent=S.xb;
  document.getElementById('ia').textContent=S.ap;
  lvlLabel();
}

function next(){
  S.cur=gen(); S.hints=0;
  document.getElementById('qeq').textContent=S.cur.eq;
  document.getElementById('qh').textContent='';
  document.getElementById('mtable').innerHTML='';
  document.getElementById('ai').value='';
  document.getElementById('ai').disabled=false;
  document.getElementById('fb').className='fb';
  document.getElementById('sol').className='sol';
  document.getElementById('boom').className='boom';
  document.getElementById('nxt').className='nxtrow';
  document.getElementById('creeper').style.transform='scale(1)';
  document.getElementById('bbl').textContent=BUBBLES[ri(0,BUBBLES.length-1)];
  ui();
}

function setTopic(t){
  S.topic=t;
  document.querySelectorAll('.tbtn').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('bt-'+t).classList.add('on');
  next();
}

function hint(){
  S.hints++;
  document.getElementById('qh').textContent='💡 TIP: '+S.cur.hint;
  var a=S.cur.tableNum;
  if(a && a>1){
    var target=S.cur.ans*a;
    var html='';
    for(var i=1;i<=12;i++){
      var val=a*i;
      html+='<div class="mcell'+(val===target?' hit':'')+'">'+val+'</div>';
    }
    document.getElementById('mtable').innerHTML=html;
  }
}

function showSol(){
  document.getElementById('sol').className='sol vis';
  document.getElementById('solsteps').innerHTML=S.cur.sol.map(function(s,i){
    var last=i===S.cur.sol.length-1;
    return '<span class="sstep'+(last?' hl':'')+'">'+( i+1)+'. '+s+'</span>';
  }).join('');
}

function check(){
  var v=parseFloat(document.getElementById('ai').value);
  if(isNaN(v)) return;
  var ok=Math.abs(v-S.cur.ans)<0.001;
  document.getElementById('ai').disabled=true;
  var fb=document.getElementById('fb');
  if(ok){
    fb.className='fb ok';
    fb.textContent='✅ RIGTIGT! x = '+S.cur.ans+' — Fjenden er elimineret!'+(S.hints>0?' (tip brugt)':' +10 XP!');
    document.getElementById('boom').className='boom vis';
    document.getElementById('creeper').style.transform='scale(0)';
    document.getElementById('bbl').textContent='NOOOO! Du vandt! 💥';
    S.score+=(S.hints>0?5:10); S.xp++; S.sw++;
    if(S.hints===0) S.di++;
    if(S.xp>=S.xpN){
      S.xp=0; S.level++;
      S.xpN=Math.floor(S.xpN*1.5);
      fb.textContent+=' 🎉 LEVEL UP! Du er nu level '+S.level+'!';
      S.ap+=2;
    }
  } else {
    S.hearts--;
    fb.className='fb no';
    fb.textContent='❌ Forkert! Rigtigt svar: x = '+S.cur.ans+'\nSe løsningen herunder 👇';
    document.getElementById('bbl').textContent='HAHA! Du tabte et liv! 💀';
    showSol();
    if(S.hearts<=0){
      setTimeout(function(){
        fb.textContent='💀 GAME OVER! Prøv igen — du kan det! 💪';
        S.hearts=3; S.score=0; S.level=1; S.xp=0; S.xpN=5;
        S.sw=0; S.di=0; S.xb=0; S.ap=0; ui();
      },2000);
    }
  }
  S.xb++;
  document.getElementById('nxt').className='nxtrow vis';
  ui();
}

document.getElementById('ai').addEventListener('keydown',function(e){ if(e.key==='Enter') check(); });
next();
</script>
</body>
</html>
